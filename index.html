<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Front Camera Test</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    h1 {
        margin-bottom: 20px;
        color: #f4b400;
    }

    video {
        width: 100%;
        max-width: 420px;
        border-radius: 20px;
        border: 3px solid #f4b400;
        background: #000;
    }

    .status {
        margin-top: 16px;
        text-align: center;
        color: #ccc;
    }

    button {
        margin-top: 20px;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background: #f4b400;
        color: #111;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>

<h1>Front Camera</h1>

<video id="video" autoplay playsinline muted></video>

<div class="status" id="status">
    Requesting camera permission...
</div>

<button onclick="startFrontCamera()">
    Restart Camera
</button>

<script>
let stream = null;

async function startFrontCamera() {
    const video = document.getElementById("video");
    const status = document.getElementById("status");

    status.textContent = "Opening front camera...";

    // Stop existing stream
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }

    try {
        // Try to force front camera
        stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: {
                    exact: "user"
                }
            },
            audio: false
        });
    } catch (e1) {
        try {
            // Fallback: prefer front camera
            stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: {
                        ideal: "user"
                    },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            });
        } catch (e2) {
            try {
                // Final fallback: any available camera
                stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });
            } catch (e3) {
                status.textContent =
                    "Unable to access the camera. Please allow permission and use HTTPS.";

                console.error(e3);
                return;
            }
        }
    }

    video.srcObject = stream;

    try {
        await video.play();
        status.textContent = "Front camera is active.";
    } catch (err) {
        status.textContent = "Camera opened, but video playback failed.";
        console.error(err);
    }
}

window.addEventListener("load", async () => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        document.getElementById("status").textContent =
            "Your browser does not support camera access.";
        return;
    }

    await startFrontCamera();
});
</script>

</body>
</html>
